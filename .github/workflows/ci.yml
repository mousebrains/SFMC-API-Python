name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ examples/

      - name: Ruff format check
        run: ruff format --check src/ examples/

      - name: Mypy
        run: mypy src/sfmc_api/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # drifter extra included so the drifter-follower example tests
      # run instead of silently skipping on missing netCDF4/numpy
      - name: Install dependencies
        run: pip install -e ".[dev,drifter]"

      - name: Run tests with coverage
        run: pytest --cov=sfmc_api --cov-report=xml --cov-fail-under=70 tests/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install package
        run: pip install -e .

      - name: Verify import
        run: python -c "from sfmc_api import SFMCClient, SFMCConfig, __version__; print(f'sfmc-api {__version__} OK')"

  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Check sdist contains docs and examples
        run: |
          tar -tzf dist/*.tar.gz | grep -q '/docs/' || { echo "sdist missing docs/"; exit 1; }
          tar -tzf dist/*.tar.gz | grep -q '/examples/' || { echo "sdist missing examples/"; exit 1; }

      - name: Smoke-test wheel install
        run: |
          python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install dist/*.whl
          /tmp/wheel-venv/bin/python -c "from sfmc_api import SFMCClient, __version__; print(f'wheel {__version__} OK')"
          /tmp/wheel-venv/bin/sfmc-api --version
