        schema:
          type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Token from POST /signin.
  responses:
    Unauthorized:
      description: Token missing or expired; re-run POST /signin.
    RateLimited:
      description: Rate limited. Wait the milliseconds in the x-rate-limit-retry-after-milliseconds header,
        then retry.
  schemas:
    SigninRequest:
      type: object
      required:
      - clientId
      - secret
      properties:
        clientId:
          type: string
        secret:
          type: string
    SigninResponse:
      type: object
      properties:
        token:
          type: string
    BareString:
      type: string
      description: A bare JSON string (the request body is a quoted string, not an object).
    GliderDetails:
      type: object
      description: Fields the client consumes; the server may return more.
      properties:
        data:
          type: object
          additionalProperties: true
          properties:
            id:
              type: integer
            name:
              type: string
            state:
              type: string
              description: e.g. deployed, disconnected.
    ActiveDeployment:
      type: object
      description: Fields the client consumes; the server may return more.
      properties:
        data:
          type: object
          additionalProperties: true
          properties:
            id:
              type: integer
            currentScriptName:
              type:
              - string
              - 'null'
            currentScriptType:
              type: string
            isCurrentScriptRunning:
              type: boolean
    FileEntry:
      type: object
      properties:
        fileName:
          type: string
        dateTimeModified:
          type: string
          description: '`YYYY-MM-DD HH:MM:SS` (glider or dockserver clock).'
        fileSize:
          type: integer
    FileListing:
      type: object
      properties:
        limit:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/FileEntry'
    ZmodemTransfers:
      type: object
      description: Fields the client consumes; the server may return more.
      properties:
        data:
          type: object
          additionalProperties: true
          properties:
            downloads:
              type: array
              items:
                type: object
            uploads:
              type: array
              items:
                type: object
            totalDownloadBytes:
              type: integer
