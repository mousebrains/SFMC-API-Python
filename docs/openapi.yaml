openapi: 3.1.0
info:
  title: SFMC REST & Streaming API
  version: v1
  summary: Slocum Fleet Mission Control HTTP and STOMP interface.
  description: Derived from the `sfmc_api` Python client and the Teledyne SFMC Node.js reference library,
    cross-checked against a live server (`gliderfmc1.ceoas.oregonstate.edu`). Verbs, paths, parameters,
    and the auth flow are verified against working code. Response bodies are documented only for the fields
    the clients consume — a server may return more. Not affiliated with Teledyne Webb Research; consult
    Appendix E of the SFMC User Manual for the authoritative specification.
servers:
- url: https://{host}/sfmc/api
  variables:
    host:
      default: gliderfmc1.ceoas.oregonstate.edu
      description: SFMC server hostname or IP.
tags:
- name: Authentication
  description: Exchange credentials for a bearer token.
- name: Glider Management
  description: Register gliders; read status, deployment, sensors.
- name: File Operations
  description: List, upload, download, and delete glider files.
- name: Plans — Query
  description: Read a glider's assigned plans.
- name: Plans — Update
  description: Replace an assigned plan by file upload.
- name: Plans — Delete Rules
  description: Remove rule classes from a plan.
- name: Deploy Files
  description: Generate and deploy glider files from plans.
- name: Script Control
  description: Assign and steer the mission script; send commands.
- name: Zmodem Transfers
  description: Read per-connection file-transfer records.
security:
- bearerAuth: []
x-stomp-streaming:
  protocol: STOMP 1.2 over SockJS WebSocket
  connect: wss://{host}/sfmc/api/sfmc-stomp/{serverId}/{sessionId}/websocket?access_token={token}
  notes: '{serverId} is a random 3-digit number and {sessionId} a random string (SockJS convention). After
    the socket opens, send a STOMP CONNECT frame with accept-version: 1.2 and a heart-beat, then SUBSCRIBE
    to topics. {gliderId} is data.id from GET /v1/gliders/{gliderName}; {deploymentId} is data.id from
    GET /v1/active-deployment/{gliderName}.'
  topics:
  - topic: /topic/glider-connections-{gliderId}
    summary: Connection open/close events for a glider.
    example:
      active: true
      id: 40801
      startDateTime: '2026-07-17 13:51:47'
      endDateTime: null
  - topic: /topic/glider-link-output/{gliderId}
    summary: Raw dialog output from the glider, line by line.
    example:
      sequenceNumber: 562080
      data: 'GPS Location: …'
  - topic: /topic/glider-script-assignment-updates-{gliderId}
    summary: Script assignment and run-state changes.
    example:
      scriptName: riot.xml
      scriptType: user
      scriptState: T1WaitForSurfacing
      paused: false
  - topic: /topic/new-and-updated-zmodem-transfers-{deploymentId}
    summary: New and updated Zmodem transfer records for the deployment.
  - topic: /topic/low-freq-glider-deployment-updates-{deploymentId}
    summary: Low-frequency deployment status updates.
